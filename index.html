<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RestoForms — Заявка на ремонт</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7f2;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      position: relative;
    }
    h1 { text-align: center; margin: 0 0 10px; }

    .topActions{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap:10px;
      margin-bottom: 8px;
    }
    .smallBtn{
      display:inline-block;
      padding:10px 14px;
      border-radius:10px;
      border:1px solid #e9d8cf;
      background:#fff;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      color:#2b2b2b;
    }
    .smallBtn.primary{
      background:#e66a2c;
      border:none;
      color:#fff;
      box-shadow:0 6px 14px rgba(230,106,44,0.25);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    select, input, textarea, button {
      width: 100%;
      margin-top: 5px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      background: #e66a2c;
      color: white;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { background: #cc5a22; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .success {
      margin-top: 15px;
      color: #1a7f37;
      text-align: center;
      font-weight: 600;
    }
    .error {
      margin-top: 15px;
      color: #b42318;
      text-align: center;
      font-weight: 600;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    .whoami{
      margin-top: 8px;
      font-size: 12px;
      color:#666;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="topActions">
      <a class="smallBtn primary" href="./list.html">Усі заявки</a>
      <button class="smallBtn" id="logoutBtn" type="button">Вийти</button>
    </div>

    <h1>Заявка на ремонт</h1>

    <form id="repairForm">
      <label>Тип заявки</label>
      <select id="category" required>
        <option value="">Оберіть</option>
        <option>Технічний відділ</option>
        <option>Виробниче обладнання</option>
        <option>IT підтримка</option>
        <option>Служба безпеки</option>
      </select>

      <label>Локація</label>
      <input type="text" id="location" placeholder="Наприклад: Кухня / Бар / Зал" required>

      <label>Опис проблеми</label>
      <textarea id="description" rows="4" placeholder="Опишіть проблему..." required></textarea>

      <label>Пріоритет</label>
      <select id="priority">
        <option>Звичайний</option>
        <option>Терміново</option>
        <option>Критично</option>
      </select>

      <button id="submitBtn" type="submit">Надіслати заявку</button>
    </form>

    <div class="whoami" id="whoami"></div>
    <div class="success" id="successMessage"></div>
    <div class="error" id="errorMessage"></div>
    <div class="hint" id="hintMessage"></div>
  </div>

  <script>
    // === 1) Supabase config ===
    const SUPABASE_URL = "https://ioalbfudggllsdoxgidw.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ajzJVm91J-1BDaMicN-g5g_kMKRqZwq";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Профиль текущего пользователя (заполним при init)
    let CURRENT_PROFILE = null;

    // === 2) Helpers ===
    function pad4(n) { return String(n).padStart(4, "0"); }

    function makeRequestNumber() {
      const d = new Date();
      const yy = String(d.getFullYear()).slice(-2);
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const rnd = Math.floor(Math.random() * 10000);
      return `RQ-${yy}${mm}-${pad4(rnd)}`;
    }

    function computeDeadline(priority) {
      const now = new Date();
      let hoursToAdd = 72;
      if (priority === "Терміново") hoursToAdd = 24;
      if (priority === "Критично") hoursToAdd = 4;
      now.setHours(now.getHours() + hoursToAdd);
      return now.toISOString();
    }

    function mapResponsibleDepartment(category) {
      return category;
    }

    function clearMessages() {
      document.getElementById("successMessage").textContent = "";
      document.getElementById("errorMessage").textContent = "";
      document.getElementById("hintMessage").textContent = "";
    }

    function setBusy(isBusy) {
      const btn = document.getElementById("submitBtn");
      btn.disabled = isBusy;
      btn.textContent = isBusy ? "Надсилаю..." : "Надіслати заявку";
    }

    function setErr(msg, hint) {
      document.getElementById("errorMessage").textContent = msg || "";
      document.getElementById("hintMessage").textContent = hint || "";
    }

    async function requireSessionOrRedirect() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        // если что-то странное с auth — отправим на логин
        window.location.href = "./login.html";
        return null;
      }
      if (!data?.session) {
        window.location.href = "./login.html";
        return null;
      }
      return data.session;
    }

    async function ensureProfile(session) {
      const uid = session.user.id;
      const email = (session.user.email || "").toLowerCase();

      // 1) пробуем найти profile
      const p1 = await supabaseClient
        .from('profiles')
        .select('user_id, restaurant_id, role')
        .eq('user_id', uid)
        .maybeSingle();

      if (p1.error) {
        setErr("Помилка читання профілю", p1.error.message);
        return null;
      }
      if (p1.data) return p1.data;

      // 2) если профиля нет — ищем invite в allowed_emails
      const inv = await supabaseClient
        .from('allowed_emails')
        .select('restaurant_id, role')
        .eq('email', email)
        .maybeSingle();

      if (inv.error) {
        setErr("Помилка перевірки запрошення", inv.error.message);
        return null;
      }
      if (!inv.data) {
        // не приглашён ни в один ресторан
        setErr(
          "Немає доступу до жодного ресторану.",
          "Попроси директора додати твій email у список запрошених."
        );
        return null;
      }

      // 3) создаём profile
      const ins = await supabaseClient
        .from('profiles')
        .insert([{
          user_id: uid,
          restaurant_id: inv.data.restaurant_id,
          role: inv.data.role || 'staff'
        }])
        .select('user_id, restaurant_id, role')
        .single();

      if (ins.error) {
        setErr("Не вдалося створити профіль", ins.error.message);
        return null;
      }
      return ins.data;
    }

    // === 3) Logout ===
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "./login.html";
    });

    // === 4) Form submit ===
    const form = document.getElementById("repairForm");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      clearMessages();

      if (!CURRENT_PROFILE) {
        return setErr("Немає профілю користувача.", "Спробуй перезайти або звернись до директора.");
      }

      const category = document.getElementById("category").value.trim();
      const location = document.getElementById("location").value.trim();
      const description = document.getElementById("description").value.trim();
      const priority = document.getElementById("priority").value.trim();

      if (!category || !location || !description) {
        return setErr("Заповніть усі обовʼязкові поля.");
      }

      const { data: sessData } = await supabaseClient.auth.getSession();
      const session = sessData?.session;
      if (!session) {
        window.location.href = "./login.html";
        return;
      }

      const request_number = makeRequestNumber();
      const deadline = computeDeadline(priority);
      const responsible_department = mapResponsibleDepartment(category);

      setBusy(true);

      const payload = {
        request_number,
        restaurant: "Н/Д",                      // можно позже заменить на имя ресторана
        initiator: session.user.email || "Н/Д",  // будет полезно
        category,
        equipment_zone: location,
        description,
        photo_url: null,
        criticality: priority,
        responsible_department,
        status: "Нова",
        deadline,

        // ВАЖНО для RLS
        restaurant_id: CURRENT_PROFILE.restaurant_id,
        created_by: session.user.id
      };

      const { error } = await supabaseClient
        .from("requests")
        .insert([payload]);

      setBusy(false);

      if (error) {
        console.log("INSERT ERROR:", error);
        return setErr(
          "Помилка при надсиланні.",
          error.message || "дивись консоль"
        );
      }

      document.getElementById("successMessage").textContent = "Заявка успішно відправлена!";
      document.getElementById("hintMessage").textContent = `Номер: ${request_number}`;
      form.reset();
    });

    // === 5) Init (guard + profile) ===
    (async function init() {
      clearMessages();
      const session = await requireSessionOrRedirect();
      if (!session) return;

      const profile = await ensureProfile(session);
      CURRENT_PROFILE = profile;

      const who = document.getElementById('whoami');
      if (profile) {
        who.textContent = `Ви: ${session.user.email} · роль: ${profile.role}`;
      } else {
        who.textContent = `Ви: ${session.user.email}`;
      }

      console.log("INDEX READY", { profile });
    })();
  </script>
</body>
</html>
