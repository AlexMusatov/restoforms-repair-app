<!DOCTYPE html>
<html lang="ru">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RestoForms — Заявка на ремонт</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #fff7f2;
  margin: 0;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}
h1 {
  text-align: center;
}
label {
  display: block;
  margin-top: 15px;
  font-weight: bold;
}
select, input, textarea, button {
  width: 100%;
  margin-top: 5px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}
button {
  margin-top: 20px;
  background: #e66a2c;
  color: white;
  font-weight: 600;
  border: none;
  transition: 0.2s;
}
button:hover {
  background: #cc5a22;
}
.success {
  margin-top: 15px;
  color: green;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">
<h1>Заявка на ремонт</h1>

<form id="repairForm">
<label>Тип заявки</label>
<select id="category" required>
<option value="">Оберить</option>
<option>Технічний відділ</option>
<option>Виробниче обладнання</option>
<option>IT підтримка</option>
<option>Служба безпеки</option>
</select>

<label>Локація</label>
<input type="text" id="location" placeholder="Наприклад: Кухня / Бар / Зал" required>

<label>Опис проблеми</label>
<textarea id="description" rows="4" placeholder="Опишіть проблему..." required></textarea>

<label>Пріоритет</label>
<select id="priority">
<option>Звичайний</option>
<option>Терміново</option>
<option>Критично</option>
</select>

<button type="submit">Надіслати заявку</button>
</form>

<div class="success" id="successMessage"></div>
</div>

<script>
const form = document.getElementById('repairForm');
const successMessage = document.getElementById('successMessage');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const newRequest = {
    category: document.getElementById('category').value,
    location: document.getElementById('location').value,
    description: document.getElementById('description').value,
    priority: document.getElementById('priority').value,
    date: new Date().toLocaleString()
  };

  let requests = JSON.parse(localStorage.getItem('repairRequests')) || [];
  requests.push(newRequest);
  localStorage.setItem('repairRequests', JSON.stringify(requests));

  successMessage.innerText = "Заявка успішно відправлена!";
  form.reset();
});
</script>

<script>
  const SUPABASE_URL = "https://ioalbfudggllsdoxgidw.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_ajzJVm91J-1BDaMicN-g5g_kMKRqZwq";

  const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

async function testConnection() {
  const { data, error } = await supabaseClient
    .from('requests')
    .select('*')
    .limit(1);

  console.log("TEST RESULT:", data, error);
}

testConnection();
</script>
</body>
</html>
