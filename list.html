<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestoForms — Заявки</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff7f2;
      margin: 0;
      padding: 20px;
    }

    .topbar {
      max-width: 900px;
      margin: 0 auto 14px auto;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #e9d8cf;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      color: #2b2b2b;
    }

    .btn.primary {
      background: #e66a2c;
      color: #fff;
      border: none;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      padding: 16px;
    }

    h1 {
      margin: 0 0 12px 0;
      text-align: left;
      font-size: 24px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    select, input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: #fff;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 6px 0 14px 0;
      color: #666;
      font-size: 14px;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      border: 1px solid #f0e2db;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .rq {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #eaf1ff;
      color: #2d4d9c;
      font-weight: 700;
      font-size: 13px;
    }

    .sub {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      color: #333;
      font-size: 14px;
    }

    .muted {
      color: #777;
    }

    .error {
      margin-top: 10px;
      color: #b00020;
      font-weight: 700;
    }

    .empty {
      padding: 22px;
      text-align: center;
      color: #777;
      border: 1px dashed #f0e2db;
      border-radius: 12px;
    }

    @media (max-width: 820px) {
      .filters { grid-template-columns: 1fr 1fr; }
      .sub { grid-template-columns: 1fr; }
      h1 { text-align: center; }
      .topbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a class="btn" href="./index.html">← Назад до форми</a>
    <div style="display:flex; gap:10px;">
      <button class="btn" id="refreshBtn">Оновити</button>
      <button class="btn primary" id="resetBtn">Скинути фільтри</button>
    </div>
  </div>

  <div class="wrap">
    <h1>Заявки</h1>

    <div class="filters">
      <select id="filterRestaurant">
        <option value="">Всі ресторани</option>
      </select>

      <select id="filterCategory">
        <option value="">Всі категорії</option>
      </select>

      <select id="filterStatus">
        <option value="">Всі статуси</option>
        <option value="Нова">Нова</option>
        <option value="В роботі">В роботі</option>
        <option value="Готово">Готово</option>
        <option value="Відхилено">Відхилено</option>
      </select>

      <select id="filterCriticality">
        <option value="">Вся критичність</option>
        <option value="Звичайна">Звичайна</option>
        <option value="Терміново">Терміново</option>
        <option value="Критично">Критично</option>
      </select>

      <input id="searchRq" placeholder="Пошук: RQ-..." />
    </div>

    <div class="meta">
      <div>Знайдено: <b id="count">0</b> заявок</div>
      <div class="muted" id="hint"></div>
    </div>

    <div class="list" id="list"></div>
    <div class="error" id="err"></div>
  </div>

  <script>
    // 1) Вставь свои значения (у тебя они уже есть)
    const SUPABASE_URL = "https://ioalbfudggllsdoxgidw.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ajzJVm91J-1BDaMicN-g5g_kMKRqZwq";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const elList = document.getElementById('list');
    const elCount = document.getElementById('count');
    const elErr = document.getElementById('err');
    const elHint = document.getElementById('hint');

    const filterRestaurant = document.getElementById('filterRestaurant');
    const filterCategory = document.getElementById('filterCategory');
    const filterStatus = document.getElementById('filterStatus');
    const filterCriticality = document.getElementById('filterCriticality');
    const searchRq = document.getElementById('searchRq');

    const refreshBtn = document.getElementById('refreshBtn');
    const resetBtn = document.getElementById('resetBtn');

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtDate(dt) {
      if (!dt) return "";
      try {
        const d = new Date(dt);
        return d.toLocaleString('uk-UA');
      } catch {
        return String(dt);
      }
    }

    function cardTemplate(r) {
      const rq = r.request_number || "RQ-...";
      const status = r.status || "Нова";
      const restaurant = r.restaurant || "-";
      const category = r.category || "-";
      const zone = r.equipment_zone || "-";
      const desc = r.description || "-";
      const dept = r.responsible_department || "-";
      const crit = r.criticality || "-";
      const deadline = fmtDate(r.deadline);
      const created = fmtDate(r.created_at);

      return `
        <div class="card">
          <div class="row">
            <div class="rq">${escapeHtml(rq)}</div>
            <div class="badge">${escapeHtml(status)}</div>
          </div>

          <div class="sub">
            <div><span class="muted">Ресторан:</span> <b>${escapeHtml(restaurant)}</b></div>
            <div><span class="muted">Категорія:</span> <b>${escapeHtml(category)}</b></div>
            <div><span class="muted">Зона/обладнання:</span> ${escapeHtml(zone)}</div>
            <div><span class="muted">Відповідальний підрозділ:</span> ${escapeHtml(dept)}</div>
            <div><span class="muted">Критичність:</span> <b>${escapeHtml(crit)}</b></div>
            <div><span class="muted">Дедлайн:</span> <b>${escapeHtml(deadline)}</b></div>
            <div style="grid-column: 1 / -1;">
              <span class="muted">Опис:</span> ${escapeHtml(desc)}
            </div>
            <div style="grid-column: 1 / -1;" class="muted">
              Створено: ${escapeHtml(created)}
            </div>
          </div>
        </div>
      `;
    }

    async function loadDistinctOptions() {
      // Тянем последние 500, чтобы собрать варианты для фильтров.
      // Для MVP этого хватает. Если станет большим, сделаем отдельные таблицы-справочники.
      const { data, error } = await supabaseClient
        .from('requests')
        .select('restaurant, category')
        .order('created_at', { ascending: false })
        .limit(500);

      if (error) return;

      const restaurants = Array.from(new Set((data || []).map(x => x.restaurant).filter(Boolean))).sort();
      const categories = Array.from(new Set((data || []).map(x => x.category).filter(Boolean))).sort();

      // ресторан
      const keepR = filterRestaurant.value;
      filterRestaurant.innerHTML = `<option value="">Всі ресторани</option>` + restaurants.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      filterRestaurant.value = keepR;

      // категория
      const keepC = filterCategory.value;
      filterCategory.innerHTML = `<option value="">Всі категорії</option>` + categories.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
      filterCategory.value = keepC;
    }

    async function loadList() {
      elErr.textContent = "";
      elHint.textContent = "Завантаження...";
      elList.innerHTML = "";

      let q = supabaseClient
        .from('requests')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(200);

      if (filterRestaurant.value) q = q.eq('restaurant', filterRestaurant.value);
      if (filterCategory.value) q = q.eq('category', filterCategory.value);
      if (filterStatus.value) q = q.eq('status', filterStatus.value);
      if (filterCriticality.value) q = q.eq('criticality', filterCriticality.value);

      const s = searchRq.value.trim();
      if (s) {
        // поиск по номеру заявки
        q = q.ilike('request_number', `%${s}%`);
      }

      const { data, error } = await q;

      if (error) {
        elHint.textContent = "";
        elCount.textContent = "0";
        elErr.textContent = `Помилка читання з Supabase: ${error.message}`;
        elList.innerHTML = `<div class="empty">Не вдалося завантажити заявки</div>`;
        return;
      }

      const rows = data || [];
      elCount.textContent = String(rows.length);
      elHint.textContent = rows.length ? "" : "Поки що порожньо";

      if (!rows.length) {
        elList.innerHTML = `<div class="empty">Заявок не знайдено</div>`;
        return;
      }

      elList.innerHTML = rows.map(cardTemplate).join('');
    }

    function wire() {
      const rerun = () => loadList();

      filterRestaurant.addEventListener('change', rerun);
      filterCategory.addEventListener('change', rerun);
      filterStatus.addEventListener('change', rerun);
      filterCriticality.addEventListener('change', rerun);

      let t = null;
      searchRq.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(() => loadList(), 250);
      });

      refreshBtn.addEventListener('click', async () => {
        await loadDistinctOptions();
        await loadList();
      });

      resetBtn.addEventListener('click', async () => {
        filterRestaurant.value = "";
        filterCategory.value = "";
        filterStatus.value = "";
        filterCriticality.value = "";
        searchRq.value = "";
        await loadDistinctOptions();
        await loadList();
      });
    }

    (async function init() {
      wire();
      await loadDistinctOptions();
      await loadList();
      console.log("LIST PAGE READY");
    })();
  </script>
</body>
</html>
