<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestoForms — Адмін</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fff7f2; margin:0; padding:20px; }
    .wrap { max-width:600px; margin:0 auto; background:#fff; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08); padding:18px; }
    h1 { margin-top:0; }
    input, button { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; font-size:14px; margin-top:8px; }
    button { background:#e66a2c; color:#fff; border:none; font-weight:700; cursor:pointer; }
    .block { margin-bottom:24px; }
    .msg { margin-top:8px; font-weight:700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Адмін ресторану</h1>

    <div class="block">
      <h3>Мій ресторан</h3>
      <div id="restaurantInfo"></div>
      <input id="restaurantName" placeholder="Назва ресторану"/>
      <button id="createRestaurantBtn">Створити ресторан</button>
    </div>

    <div class="block">
      <h3>Запросити співробітника</h3>
      <input id="inviteEmail" type="email" placeholder="email співробітника"/>
      <button id="inviteBtn">Надіслати запрошення</button>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://ioalbfudggllsdoxgidw.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ajzJVm91J-1BDaMicN-g5g_kMKRqZwq";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const restaurantInfo = document.getElementById('restaurantInfo');
    const restaurantNameInput = document.getElementById('restaurantName');
    const createBtn = document.getElementById('createRestaurantBtn');
    const inviteBtn = document.getElementById('inviteBtn');
    const inviteEmailInput = document.getElementById('inviteEmail');
    const msgEl = document.getElementById('msg');

    let currentRestaurantId = null;

    async function guard() {
      const { data } = await supabaseClient.auth.getSession();
      if (!data?.session) {
        window.location.href = "./login.html";
      }
    }

    async function loadRestaurant() {
      const { data, error } = await supabaseClient
        .from("restaurants")
        .select("*")
        .limit(1);

      if (data && data.length) {
        currentRestaurantId = data[0].id;
        restaurantInfo.innerHTML = "<b>" + data[0].name + "</b>";
        createBtn.disabled = true;
        restaurantNameInput.disabled = true;
      }
    }

    createBtn.addEventListener("click", async () => {
      const name = restaurantNameInput.value.trim();
      if (!name) return;

      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData.user;

      const { data, error } = await supabaseClient
        .from("restaurants")
        .insert([{ name: name, owner_user_id: user.id }])
        .select()
        .single();

      if (error) {
        alert(error.message);
        return;
      }

      currentRestaurantId = data.id;

      await supabaseClient.from("restaurant_members").insert([
        {
          restaurant_id: data.id,
          user_id: user.id,
          role: "admin"
        }
      ]);

      location.reload();
    });

    inviteBtn.addEventListener("click", async () => {
      msgEl.textContent = "";

      if (!currentRestaurantId) {
        msgEl.textContent = "Спочатку створіть ресторан";
        return;
      }

      const email = inviteEmailInput.value.trim();
      if (!email) return;

      const { data: userData } = await supabaseClient.auth.getUser();
      const user = userData.user;

      const { error } = await supabaseClient
        .from("restaurant_invitations")
        .insert([
          {
            restaurant_id: currentRestaurantId,
            email: email,
            role: "staff",
            invited_by: user.id
          }
        ]);

      if (error) {
        msgEl.textContent = error.message;
        return;
      }

      msgEl.textContent = "Запрошення створено.";
      inviteEmailInput.value = "";
    });

    (async function init() {
      await guard();
      await loadRestaurant();
    })();
  </script>
</body>
</html>
