<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestoForms — Вхід</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; background:#fff7f2; margin:0; padding:20px; }
    .wrap { max-width:420px; margin:0 auto; background:#fff; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08); padding:18px; }
    h1 { margin:0 0 12px 0; text-align:center; font-size:24px; }
    label { display:block; margin-top:12px; font-weight:700; }
    input, button { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; font-size:14px; margin-top:6px; }
    button { background:#e66a2c; color:#fff; border:none; font-weight:700; cursor:pointer; }
    button:hover { background:#cc5a22; }
    .muted { color:#777; font-size:13px; margin-top:10px; text-align:center; }
    .msg { margin-top:10px; font-weight:700; text-align:center; }
    .err { color:#b00020; }
    .ok { color:#1b7f2a; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Вхід</h1>

    <label>Email</label>
    <input id="email" type="email" placeholder="name@company.com" />

    <button id="sendLinkBtn">Надіслати magic-link</button>

    <div class="muted">
      Ми надішлемо лист. Відкрий посилання з пошти — і ти увійдеш.
    </div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const SUPABASE_URL = "https://ioalbfudggllsdoxgidw.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_ajzJVm91J-1BDaMicN-g5g_kMKRqZwq";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const emailEl = document.getElementById('email');
    const msgEl = document.getElementById('msg');
    const btn = document.getElementById('sendLinkBtn');

    function setMsg(text, kind) {
      msgEl.className = "msg " + (kind || "");
      msgEl.textContent = text || "";
    }

    function buildRedirectUrl(path) {
      // window.location.origin -> https://your-app.vercel.app
      // гарантируем ровно один слэш между origin и путём
      const base = window.location.origin.replace(/\/$/, "");
      const p = String(path || "/").startsWith("/") ? path : ("/" + path);
      return base + p;
    }

    async function guardIfAlreadyLoggedIn() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) {
        console.log("getSession error:", error);
        return;
      }
      if (data?.session) {
        window.location.href = "./index.html";
      }
    }

    // Если сессия появится (в т.ч. после возврата с magic-link) — перекидываем
    supabaseClient.auth.onAuthStateChange((_event, session) => {
      if (session) window.location.href = "./index.html";
    });

    btn.addEventListener('click', async () => {
      setMsg("", "");
      const email = emailEl.value.trim();
      if (!email) return setMsg("Введи email", "err");

      btn.disabled = true;
      btn.textContent = "Надсилаю...";

      const redirectTo = buildRedirectUrl("/index.html");

      const { error } = await supabaseClient.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: redirectTo
        }
      });

      btn.disabled = false;
      btn.textContent = "Надіслати magic-link";

      if (error) return setMsg("Помилка: " + error.message, "err");
      setMsg("Готово. Перевір пошту 👌", "ok");
    });

    guardIfAlreadyLoggedIn();
  </script>
</body>
</html>
